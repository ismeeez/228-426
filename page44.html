<!DOCTYPE html>

        <form method="get" action="backend/ex-traitement">
            <label for="nom">Nom</label>
            <input type="text"  name="nom" id  = "nom" placeholder="Entrer le nom"
                   required
                   maxlength="25"/>
            <button type="submit">Envoyer</button>
        </form>
        <form method="get" action="backend/ex7-traitement">

                   required
                   maxlength="30" minlength="15"/>
            <button type="submit">Envoyer</button>
        </form>
        <form method="post" action="backend/pass-traitement">
            <label for="pass">Password</label>
            <input type="password" name="pass" id  = "pass" placeholder="Entrer le password"
                required
                maxlength="25"/>

        <form method="post" action="backend/number-traitement">

            <input type="number" name="number" id  = "number" placeholder="Entrer le nombre"
            min="10"/>
