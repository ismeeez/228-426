<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Contact</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>Contact
            <nav>
                <ul>
                    <li><a href="index.html">Accueil</a></li>

                    <li><a href="modeles.html">Modéles</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </header>
        <div class="hero">
            <h2>Contactez-nous</h2>
            <p>Une question ? Écrivez-nous !</p>
        </div>
        <section>
            <article>
                <div class="contact-form">
                        <h2>Formulaire de contact</h2>
                    <form method="post" action="backend/contact-traitement">
                        <label for="nom">Nom</label>
                        <input type="text" name="nom" id  = "nom" placeholder="Entrer le nom" required> <br/>

                        <label for="mail">Email</label>
                        <input type="email" name="mail" id  = "mail" placeholder="Entrer le mail" required> <br/>

                        <label for="sujet">Sujet</label>
                        <input type="text" name="sujet" id  = "sujet" placeholder="Entrer le sujet" required> <br/>

                        <label for="message">message</label>
                        <textarea name="message" id  = "message" > </textarea > <br/>

                        <button type="submit">Envoyer</button>
                    </form>
                </div>
            </article>
            <aside>
                <div class="aside-card">
                <h3>Nos coordonnées</h3>
                <ul>
                    <li>AMG Performance</li>
                    <li>contact@amg.com</li>
                    <li>+32 094 032 432</li>
                    <li>Verviers, Belgique</li>
                </ul>
            </div></aside>
        </section>
        <footer>© 2025 AMG Performance — Tous droits réservés </footer>

    </body>
